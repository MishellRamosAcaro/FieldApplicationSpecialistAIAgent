# docker-compose.yml - Field Application Specialist Environment Development
# This file is used to start the development environment for the Field Application Specialist project.
# It starts the Nginx server, the FastAPI server and the PostgreSQL database.
# It also starts the DBeaver server to manage the database.

services:

  nginx:
    build:
      context: ./Website3.0
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - 80:80
    environment:
      TZ: ${TZ}

  fastapi:
    build:
      context: ./Atlas
      dockerfile: Dockerfile
    depends_on:
      - postgres
    ports:
      - 8000:8000
    volumes:
      - ./data:/app/data
    environment:
      TZ: ${TZ}


  postgres:
    image: postgres:16.10-alpine
    volumes:
      - ./ddbb/postgresql:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - 5432:5432

  dbeaver:
    depends_on:
      - postgres
    image: dbeaver/cloudbeaver:25.2.0
    ports:
      - 8978:8978
    environment:
      DBEAVER_SERVER_NAME: ${DBEAVER_SERVER_NAME}
      DBEAVER_ADMIN_NAME: ${DBEAVER_ADMIN_NAME}
      DBEAVER_ADMIN_PASSWORD: ${DBEAVER_ADMIN_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ./ddbb/cloudbeaver/workspace:/opt/cloudbeaver/workspace

